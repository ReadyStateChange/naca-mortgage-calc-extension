# Railway config for the website service
# Set Config File Path in Railway dashboard to: /railway-web.toml

[build]
builder = "railpack"
buildCommand = "bun install && bun run --cwd packages/website build"


[deploy]
startCommand = "bun run --cwd packages/website start"
healthcheckPath = "/api/rates"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
