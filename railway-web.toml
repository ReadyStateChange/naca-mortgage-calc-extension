# Railway config for the website service
# Set Config File Path in Railway dashboard to: /railway-web.toml

[build]
builder = "nixpacks"
buildCommand = "bun run --cwd packages/website build"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["bun"]

[build.nixpacksPlan.phases.install]
dependsOn = ["setup"]
cmds = ["bun install"]

[deploy]
startCommand = "bun run --cwd packages/website start"
healthcheckPath = "/api/rates"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
