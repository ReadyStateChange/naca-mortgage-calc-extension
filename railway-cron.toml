# Railway config for the rate-update cron service
# Set Config File Path in Railway dashboard to: /railway-cron.toml

[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["bun"]

[build.nixpacksPlan.phases.install]
dependsOn = ["setup"]
cmds = ["bun install"]

[deploy]
startCommand = "bun run --cwd packages/website src/scripts/runRateUpdate.ts"
cronSchedule = "0 */6 * * *"
restartPolicyType = "NEVER"
